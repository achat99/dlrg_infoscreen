<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Infoscreen – DLRG Jugend</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap');

  :root {
    --navy: #1a3050;
    --navy-dark: #142640;
    --navy-light: #2a4a6e;
    --magenta: #e31054;
    --magenta-dark: #c00d47;
    --light-bg: #eceef0;
    --light-bg2: #f4f5f6;
    --text-dark: #1a2a3a;
    --text-dim: #5a6a7a;
    --white: #ffffff;
    --slide-duration: 8000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--light-bg);
    font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif;
    color: var(--text-dark);
  }

  /* ══════════════════════════════════════
     SETUP SCREEN
     ══════════════════════════════════════ */
  #setup {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--light-bg);
    position: relative; z-index: 100;
  }
  #setup.hidden { display: none; }

  #setup::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 100%;
    background: var(--navy);
    /* Navy: flatter angle, edge hits bottom at ~48% from left */
    clip-path: polygon(100% 0, 100% 100%, 48% 100%);
    z-index: 0;
  }
  #setup::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 100%;
    background: var(--magenta);
    /* Magenta: steeper angle, broader stripe (~3%), different angle than navy */
    clip-path: polygon(44% 100%, 48.5% 100%, 100% 0%, 96.5% 0%);
    z-index: 1;
  }

  .setup-content {
    text-align: center;
    max-width: 650px;
    position: relative; z-index: 10;
  }
  .setup-content h1 {
    font-size: 44px;
    font-weight: 900;
    font-style: italic;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  .setup-content p {
    font-size: 17px;
    color: var(--text-dim);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .drop-zone {
    width: 460px; height: 200px;
    border: 2.5px dashed #b0b8c0;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    margin: 0 auto 20px;
    position: relative;
    background: rgba(255,255,255,0.7);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--magenta);
    background: rgba(227,16,84,0.04);
    transform: scale(1.02);
  }
  .drop-zone svg { margin-bottom: 14px; color: var(--navy); opacity: 0.35; }
  .drop-zone span { font-size: 15px; color: var(--text-dim); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .setup-hint { font-size: 13px; color: #8899aa; }

  /* ══════════════════════════════════════
     MAIN DISPLAY
     ══════════════════════════════════════ */
  #display {
    width: 1920px; height: 1080px;
    position: relative; overflow: hidden;
    display: none;
  }
  #display.active { display: block; }

  .bg-light { position: absolute; inset: 0; background: var(--light-bg); z-index: 0; }
  .bg-diagonal-navy {
    position: absolute; inset: 0;
    background: var(--navy);
    /* Navy: flatter angle, edge from top-right to ~48% bottom-left */
    clip-path: polygon(100% 0, 100% 100%, 48% 100%);
    z-index: 1;
  }
  .bg-diagonal-magenta {
    position: absolute; inset: 0;
    background: var(--magenta);
    /* Magenta: steeper angle, broad stripe ~3.5% wide, different angle than navy */
    clip-path: polygon(44% 100%, 48.5% 100%, 100% 0%, 96.5% 0%);
    z-index: 2;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: var(--magenta); z-index: 20;
  }

  .header {
    position: absolute;
    top: 28px; left: 50px; right: 50px;
    display: flex; align-items: flex-start; justify-content: space-between;
    z-index: 10;
  }
  .header-title { font-size: 20px; font-weight: 700; color: var(--text-dark); }
  .header-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 2px; }
  .header-clock { font-size: 28px; font-weight: 700; color: var(--text-dark); letter-spacing: 1px; text-align: right; }
  .header-date-line { font-size: 13px; color: var(--text-dim); text-align: right; margin-top: 2px; }

  .slide-container {
    position: absolute; top: 85px; bottom: 60px; left: 0; right: 0;
    z-index: 5; display: flex; align-items: center; justify-content: flex-start;
  }

  .slide {
    position: absolute; width: 100%; height: 100%;
    opacity: 0; transform: translateX(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none; display: flex; align-items: center;
  }
  .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .slide.exit { opacity: 0; transform: translateX(-30px); }

  /* ── WELCOME ── */
  .welcome-slide {
    padding: 0 70px;
    flex-direction: column; align-items: flex-start; justify-content: center;
  }
  .welcome-title {
    font-size: 82px; font-weight: 900; font-style: italic;
    color: var(--text-dark); line-height: 1.05; margin-bottom: 14px;
  }
  .welcome-sub { font-size: 28px; color: var(--text-dim); font-weight: 400; max-width: 800px; }

  /* ── PROGRAM SINGLE ── */
  .program-slide { padding: 0 70px; gap: 50px; align-items: center; }
  .prog-time-block { flex: 0 0 auto; text-align: center; min-width: 200px; }
  .prog-time {
    font-size: 86px; font-weight: 900; font-style: italic;
    color: var(--navy); line-height: 1; letter-spacing: -2px;
  }
  .prog-location {
    font-size: 14px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--magenta); font-weight: 700; margin-top: 10px;
  }
  .prog-separator {
    width: 4px; align-self: stretch; max-height: 320px;
    background: linear-gradient(180deg, var(--magenta), var(--navy));
    border-radius: 2px; flex-shrink: 0;
  }
  .prog-content { flex: 1; max-width: 850px; }
  .prog-category {
    font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--magenta); font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .prog-category::before {
    content: ''; width: 28px; height: 3px;
    background: var(--magenta); display: inline-block;
  }
  .prog-title {
    font-size: 62px; font-weight: 900; font-style: italic;
    color: var(--text-dark); line-height: 1.08; margin-bottom: 18px; letter-spacing: -1px;
  }
  .prog-desc { font-size: 24px; color: var(--text-dim); line-height: 1.5; font-weight: 300; }
  .prog-icon { font-size: 44px; margin-top: 24px; }

  /* ── OVERVIEW ── */
  .overview-slide {
    padding: 10px 70px; flex-direction: column;
    align-items: flex-start; justify-content: center; width: 100%;
  }
  .ov-heading {
    font-size: 14px; text-transform: uppercase; letter-spacing: 4px;
    color: var(--magenta); font-weight: 700; margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .ov-heading::after {
    content: ''; flex: 1; height: 2px;
    background: linear-gradient(90deg, var(--magenta), transparent);
    opacity: 0.3; max-width: 400px;
  }
  .ov-list { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 1050px; }
  .ov-row {
    display: flex; align-items: center; gap: 24px; padding: 16px 24px;
    border-radius: 12px; background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .ov-row:nth-child(even) { background: rgba(255,255,255,0.25); }
  .ov-row .ov-icon { font-size: 24px; min-width: 36px; text-align: center; }
  .ov-row .ov-time { font-size: 22px; font-weight: 800; font-style: italic; color: var(--navy); min-width: 100px; }
  .ov-row .ov-name { font-size: 22px; font-weight: 600; color: var(--text-dark); flex: 1; }
  .ov-row .ov-loc { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); font-weight: 600; }

  /* ── NOTICE ── */
  .notice-slide { flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 70px; }
  .notice-badge {
    font-size: 13px; text-transform: uppercase; letter-spacing: 4px;
    font-weight: 700; padding: 8px 28px; border-radius: 6px; margin-bottom: 30px;
  }
  .notice-slide.info .notice-badge { background: var(--navy); color: var(--white); }
  .notice-slide.warning .notice-badge {
    background: var(--magenta); color: var(--white);
    animation: pulse-warn 2s ease-in-out infinite;
  }
  @keyframes pulse-warn {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; transform: scale(1.03); }
  }
  .notice-title {
    font-size: 68px; font-weight: 900; font-style: italic;
    color: var(--text-dark); line-height: 1.1; margin-bottom: 20px; max-width: 850px;
  }
  .notice-text { font-size: 28px; color: var(--text-dim); line-height: 1.6; max-width: 800px; font-weight: 300; }

  /* ── LOGO AREA ── */
  .logo-area {
    position: absolute;
    bottom: 35px; right: 55px;
    z-index: 15;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-area img {
    max-height: 70px;
    max-width: 200px;
    filter: brightness(0) invert(1);
    opacity: 0.85;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 900;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    line-height: 1.15;
    letter-spacing: 1px;
  }

  /* ── BOTTOM ── */
  .progress-bar {
    position: absolute; bottom: 0; left: 0; height: 5px;
    background: linear-gradient(90deg, var(--magenta), var(--navy)); z-index: 25;
  }
  .slide-indicators {
    position: absolute; bottom: 18px; left: 70px;
    display: flex; gap: 6px; z-index: 20;
  }
  .slide-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(26,48,80,0.15); transition: all 0.3s; }
  .slide-dot.active { width: 28px; border-radius: 4px; background: var(--magenta); }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-content">
    <h1>Event Infoscreen</h1>
    <p>Lade deine Excel-Vorlage hoch, um den Infoscreen zu starten.<br>
       Sheets: <strong>Programm</strong>, <strong>Hinweise</strong>, <strong>Einstellungen</strong></p>
    <div class="drop-zone" id="dropZone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span>Excel-Datei hier ablegen oder klicken</span>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>
    <p class="setup-hint">In OBS als Browser-Quelle (1920×1080) einbinden</p>

    <div style="margin-top: 24px;">
      <label style="font-size: 14px; color: #6a7a8a; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: 1.5px solid #c0c8d0; border-radius: 10px; background: rgba(255,255,255,0.5); transition: all 0.2s;"
        onmouseover="this.style.borderColor='#1a3050'" onmouseout="this.style.borderColor='#c0c8d0'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        Logo hochladen (optional)
        <input type="file" id="logoInput" accept="image/*" style="display:none;">
      </label>
      <span id="logoFileName" style="font-size: 13px; color: #8899aa; margin-left: 10px;"></span>
    </div>
  </div>
</div>

<div id="display">
  <div class="bg-light"></div>
  <div class="bg-diagonal-navy"></div>
  <div class="bg-diagonal-magenta"></div>
  <div class="top-bar"></div>

  <div class="header">
    <div>
      <div class="header-title" id="eventName">DLRG Jugend</div>
      <div class="header-subtitle" id="eventSubtitle"></div>
    </div>
    <div>
      <div class="header-clock" id="clock"></div>
      <div class="header-date-line" id="eventDate"></div>
    </div>
  </div>

  <div class="slide-container" id="slideContainer"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-indicators" id="indicators"></div>

  <!-- Logo bottom-right in navy area -->
  <div class="logo-area" id="logoArea">
    <img id="logoImg" src="" alt="" style="display:none;">
    <div class="logo-text" id="logoText">DLRG<br>Jugend</div>
  </div>
</div>

<script>
let programData = [], noticeData = [], settings = {}, slides = [], currentSlide = 0, slideTimer = null;
let logoDataURL = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const logoInput = document.getElementById('logoInput');

// Logo upload
logoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('logoFileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => { logoDataURL = ev.target.result; };
  reader.readAsDataURL(file);
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) processFile(e.target.files[0]); });

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => { parseWorkbook(XLSX.read(new Uint8Array(e.target.result), { type: 'array' })); startDisplay(); };
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(wb) {
  if (wb.SheetNames.includes('Programm')) {
    programData = XLSX.utils.sheet_to_json(wb.Sheets['Programm'], { defval: '' }).map(r => ({
      time: String(r['Uhrzeit']||'').trim(), title: String(r['Titel']||'').trim(),
      desc: String(r['Beschreibung']||'').trim(), location: String(r['Ort / Bühne']||r['Ort']||'').trim(),
      category: String(r['Kategorie']||'').trim(), icon: String(r['Icon (optional)']||r['Icon']||'').trim(),
    }));
  }
  if (wb.SheetNames.includes('Hinweise')) {
    noticeData = XLSX.utils.sheet_to_json(wb.Sheets['Hinweise'], { defval: '' })
      .filter(r => String(r['Aktiv (ja/nein)']||'').toLowerCase() === 'ja')
      .map(r => ({ type: String(r['Typ']||'Info').trim(), title: String(r['Titel']||'').trim(),
        text: String(r['Text']||'').trim(), priority: String(r['Priorität']||'normal').trim() }));
  }
  if (wb.SheetNames.includes('Einstellungen')) {
    XLSX.utils.sheet_to_json(wb.Sheets['Einstellungen'], { defval: '' }).forEach(r => {
      const k = String(r['Einstellung']||'').trim(), v = r['Wert'];
      if (k === 'Veranstaltungsname') settings.name = String(v);
      if (k === 'Untertitel') settings.subtitle = String(v);
      if (k === 'Datum') settings.date = String(v);
      if (k === 'Slide-Dauer (Sekunden)') settings.duration = Number(v) * 1000 || 8000;
    });
  }
}

function buildSlides() {
  slides = [];
  slides.push({ type: 'welcome' });
  if (programData.length > 0) {
    for (let i = 0; i < programData.length; i += 8)
      slides.push({ type: 'overview', data: programData.slice(i, i+8), page: Math.floor(i/8)+1, total: Math.ceil(programData.length/8) });
  }
  programData.forEach(item => slides.push({ type: 'program', data: item }));
  noticeData.forEach(item => slides.push({ type: 'notice', data: item }));
  const urgent = noticeData.filter(n => n.priority === 'hoch');
  if (urgent.length > 0) {
    const expanded = [];
    slides.forEach((s, i) => { expanded.push(s); if ((i+1)%4===0) urgent.forEach(u => expanded.push({ type:'notice', data:u })); });
    slides = expanded;
  }
}

function renderSlide(slide) {
  if (slide.type === 'welcome')
    return `<div class="slide welcome-slide"><div class="welcome-title">${settings.name||'Herzlich Willkommen'}</div><div class="welcome-sub">${settings.subtitle||settings.date||''}</div></div>`;
  if (slide.type === 'overview') {
    const pg = slide.total > 1 ? ` (${slide.page}/${slide.total})` : '';
    return `<div class="slide overview-slide"><div class="ov-heading">Programmübersicht${pg}</div><div class="ov-list">${slide.data.map(it =>
      `<div class="ov-row"><span class="ov-icon">${it.icon||''}</span><span class="ov-time">${it.time}</span><span class="ov-name">${it.title}</span><span class="ov-loc">${it.location}</span></div>`).join('')}</div></div>`;
  }
  if (slide.type === 'program') {
    const d = slide.data;
    return `<div class="slide program-slide"><div class="prog-time-block"><div class="prog-time">${d.time}</div><div class="prog-location">${d.location}</div></div><div class="prog-separator"></div><div class="prog-content"><div class="prog-category">${d.category}</div><div class="prog-title">${d.title}</div><div class="prog-desc">${d.desc}</div>${d.icon?`<div class="prog-icon">${d.icon}</div>`:''}</div></div>`;
  }
  if (slide.type === 'notice') {
    const d = slide.data, cls = d.type.toLowerCase()==='warnung'?'warning':'info';
    return `<div class="slide notice-slide ${cls}"><div class="notice-badge">${d.type.toUpperCase()}</div><div class="notice-title">${d.title}</div><div class="notice-text">${d.text}</div></div>`;
  }
  return '<div class="slide"></div>';
}

function startDisplay() {
  document.getElementById('eventName').textContent = settings.name || 'DLRG Jugend';
  document.getElementById('eventSubtitle').textContent = settings.subtitle || '';
  document.getElementById('eventDate').textContent = settings.date || '';

  // Show logo if uploaded
  if (logoDataURL) {
    const img = document.getElementById('logoImg');
    img.src = logoDataURL;
    img.style.display = 'block';
    document.getElementById('logoText').style.display = 'none';
  }

  buildSlides();
  document.getElementById('slideContainer').innerHTML = slides.map(s => renderSlide(s)).join('');
  document.getElementById('indicators').innerHTML = slides.map((_,i) => `<div class="slide-dot${i===0?' active':''}" data-i="${i}"></div>`).join('');
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('display').classList.add('active');
  currentSlide = 0; showSlide(0); startAutoRotation(); startClock();
}

function showSlide(index) {
  const all = document.querySelectorAll('.slide'), dots = document.querySelectorAll('.slide-dot');
  all.forEach((s,i) => { s.classList.remove('active','exit'); if (i===currentSlide && i!==index) s.classList.add('exit'); });
  currentSlide = index;
  setTimeout(() => { all[index]?.classList.add('active'); }, 50);
  dots.forEach((d,i) => d.classList.toggle('active', i===index));
  const bar = document.getElementById('progressBar'), dur = settings.duration||8000;
  bar.style.transition = 'none'; bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.transition = `width ${dur}ms linear`; bar.style.width = '100%'; }));
}

function startAutoRotation() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(() => showSlide((currentSlide+1)%slides.length), settings.duration||8000);
}

function startClock() {
  const el = document.getElementById('clock');
  const tick = () => el.textContent = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  tick(); setInterval(tick, 1000);
}

if (new URLSearchParams(window.location.search).get('demo')==='true') {
  settings = { name:'Herzlich Willkommen', subtitle:'36. Landesjugendtreffen mit den 57. Landesmeisterschaften', date:'12. Juli 2026', duration:6000 };
  programData = [
    {time:'08:00',title:'Einlass & Anmeldung',desc:'Registrierung am Haupteingang',location:'Eingang',category:'Organisation',icon:'🚪'},
    {time:'09:00',title:'Eröffnung',desc:'Begrüßung durch den Landesjugendvorstand',location:'Hauptbühne',category:'Zeremonie',icon:'🎤'},
    {time:'09:30',title:'Rettungsschwimmen',desc:'Start der Einzelwettkämpfe',location:'Schwimmhalle',category:'Wettkampf',icon:'🏊'},
    {time:'12:00',title:'Mittagspause',desc:'Gemeinsames Mittagessen',location:'Mensa',category:'Pause',icon:'🍽️'},
    {time:'13:30',title:'Staffelwettkämpfe',desc:'Mannschaftswettbewerbe',location:'Schwimmhalle',category:'Wettkampf',icon:'🏅'},
    {time:'16:00',title:'Siegerehrung',desc:'Preisverleihung aller Disziplinen',location:'Hauptbühne',category:'Zeremonie',icon:'🏆'},
    {time:'18:00',title:'Abendprogramm',desc:'Grillen & Lagerfeuer',location:'Außengelände',category:'Freizeit',icon:'🔥'},
  ];
  noticeData = [
    {type:'Info',title:'Trinkwasser',text:'Kostenlose Trinkwasserstationen an allen Eingängen!',priority:'normal'},
    {type:'Warnung',title:'Hitzewarnung',text:'Heute bis 34°C — bitte ausreichend trinken und Sonnenschutz benutzen!',priority:'hoch'},
  ];
  startDisplay();
}
</script>
</body>
</html>
