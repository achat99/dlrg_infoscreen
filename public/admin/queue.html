<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/admin/assets/css/admin.css" rel="stylesheet" />
  </head>
  <body>
    <div id="topbar"></div>
    <main class="container py-4">
      <div class="page-header">
        <div>
          <h1>Slide-Steuerung</h1>
          <p>Queue automatisch generieren, sortieren und Live-Vorschau senden.</p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" id="reloadQueueBtn" type="button">Neu laden</button>
          <button class="btn btn-primary" id="autoGenerateBtn" type="button">Auto-Generieren</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card"><div class="card-body">
            <div id="queueList" class="queue-list list-group"></div>
            <div class="mt-3"><button class="btn btn-success" id="saveQueueBtn" type="button">Queue speichern</button></div>
          </div></div>
        </div>
        <div class="col-lg-5">
          <div class="card"><div class="card-body">
            <h2 class="h5 fw-bold mb-3">Live-Vorschau</h2>
            <iframe class="preview-frame" src="/screen" title="Infoscreen Vorschau"></iframe>
            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm" id="previewWelcomeBtn" type="button">Willkommen senden</button>
              <a class="btn btn-outline-secondary btn-sm" href="/screen" target="_blank">Groß öffnen</a>
            </div>
          </div></div>
        </div>
      </div>
    </main>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/assets/js/admin-common.js"></script>
    <script src="/admin/assets/js/queue.js"></script>
  </body>
</html>
