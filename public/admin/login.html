<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0" style="max-width: 420px; width: 100%; border-radius: 1rem;">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 fw-bold mb-2">DLRG Infoscreen</h1>
        <p class="text-secondary mb-4">Bitte Admin-Passwort eingeben.</p>
        <form id="loginForm" class="d-grid gap-3">
          <div>
            <label for="password" class="form-label">Passwort</label>
            <input id="password" name="password" type="password" class="form-control" required />
          </div>
          <button class="btn btn-primary" type="submit">Anmelden</button>
          <div id="errorBox" class="alert alert-danger d-none mb-0"></div>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const errorBox = document.getElementById('errorBox');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.classList.add('d-none');

        const password = document.getElementById('password').value;
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          errorBox.textContent = data.error || 'Login fehlgeschlagen';
          errorBox.classList.remove('d-none');
          return;
        }

        window.location.href = '/admin';
      });
    </script>
  </body>
</html>
