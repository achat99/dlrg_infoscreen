<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Slides</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/admin/assets/css/admin.css" rel="stylesheet" />
  </head>
  <body>
    <div id="topbar"></div>
    <main class="container py-4">
      <div class="page-header">
        <div>
          <h1>Custom Slides</h1>
          <p>Eigene Slides mit Überschrift, Text und bis zu vier Bildern.</p>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card"><div class="card-body">
            <h2 class="h5 fw-bold mb-3">Neuer Slide</h2>
            <form id="slideForm" class="row g-3" enctype="multipart/form-data">
              <input type="hidden" id="slideId" />
              <div class="col-12">
                <label class="form-label" for="slideTitle">Überschrift</label>
                <input class="form-control" id="slideTitle" placeholder="Überschrift" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="slideContent">Text</label>
                <textarea class="form-control" id="slideContent" rows="5" placeholder="Text zum Slide"></textarea>
              </div>
              <div class="col-12">
                <label class="form-label" for="slideImages">Bilder (max. 4)</label>
                <input class="form-control" type="file" id="slideImages" accept="image/*" multiple />
                <div class="form-text">Optional. Beim Bearbeiten ersetzen neue Bilder die bisherigen.</div>
                <div id="slideImagesPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
              </div>
              <div class="col-md-6"><input class="form-control" id="slideBg" placeholder="#013154" /></div>
              <div class="col-md-6"><input class="form-control" id="slideColor" placeholder="#ffffff" /></div>
              <div class="col-md-6"><select class="form-select" id="slideLayout"><option value="center">Center</option><option value="left">Left</option><option value="fullscreen">Fullscreen</option></select></div>
              <div class="col-md-6"><input class="form-control" type="number" min="3" id="slideDuration" placeholder="Dauer (s)" /></div>
              <div class="col-12 form-check"><input class="form-check-input" type="checkbox" id="slideActive" checked /><label class="form-check-label" for="slideActive">Aktiv</label></div>
              <div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Speichern</button><button class="btn btn-outline-secondary" type="button" id="slideCancel">Zurücksetzen</button></div>
            </form>
          </div></div>
        </div>
        <div class="col-lg-8">
          <div class="card"><div class="card-body"><div id="slidesList" class="d-grid gap-3"></div></div></div>
        </div>
      </div>
    </main>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/assets/js/admin-common.js"></script>
    <script src="/admin/assets/js/slides.js"></script>
  </body>
</html>
